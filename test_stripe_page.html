<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Stripe Checkout Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f7fafc;
        }
        .checkout-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .form-row {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #635bff;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #635bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .submit-btn:hover {
            background: #5046e5;
        }
        .PaymentElement, .StripeElement {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="checkout-container CheckoutPaymentForm">
        <h1>💳 Test Checkout</h1>
        
        <div class="form-row">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="email@example.com" autocomplete="email">
        </div>
        
        <div class="PaymentElement">
            <div class="form-row">
                <label for="cardNumber">Card Number</label>
                <input type="text" 
                       id="cardNumber" 
                       name="cardnumber" 
                       placeholder="4242 4242 4242 4242" 
                       maxlength="19"
                       autocomplete="cc-number"
                       data-stripe="number">
            </div>
            
            <div class="form-row">
                <label for="cardExpiry">Expiry Date (MM/YY)</label>
                <input type="text" 
                       id="cardExpiry" 
                       name="cc-exp"
                       placeholder="12/25" 
                       maxlength="5"
                       autocomplete="cc-exp"
                       data-stripe="exp">
            </div>
            
            <div class="form-row">
                <label for="cardCvc">CVC</label>
                <input type="text" 
                       id="cardCvc" 
                       name="cvc"
                       placeholder="123" 
                       maxlength="4"
                       autocomplete="cc-csc"
                       data-stripe="cvc">
            </div>
        </div>
        
        <button type="submit" class="submit-btn" id="submit">Pay $29.99</button>
    </div>
    
    <script>
        // Add Stripe-like data to help extension detect this as a payment page
        window.Stripe = { version: '3' };
        window.__stripe_mid = 'test_mid';
        window.__stripeKey = 'pk_test_123';
    </script>
</body>
</html>
